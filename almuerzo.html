<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Almuerzos — Depto</title>
  <style>
    :root {
      --wood-dark:  #5C3D1E;
      --wood-mid:   #7A5230;
      --cream:      #FFFDF8;
      --cream-dark: #F0DCC8;
      --text-dark:  #2C1A0E;
      --text-mid:   #6B4423;
      --text-light: #9B7355;
      --shadow:     rgba(44, 26, 14, 0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: #6B4423;
      background-image:
        repeating-linear-gradient(
          90deg,
          transparent 0px, transparent 55px,
          rgba(0,0,0,0.04) 55px, rgba(0,0,0,0.04) 56px,
          transparent 56px, transparent 110px,
          rgba(255,255,255,0.025) 110px, rgba(255,255,255,0.025) 111px
        ),
        repeating-linear-gradient(
          0deg,
          transparent 0px, transparent 90px,
          rgba(0,0,0,0.03) 90px, rgba(0,0,0,0.03) 91px
        ),
        linear-gradient(180deg, #8B6040 0%, #6B4423 35%, #7A4F30 65%, #5C3820 100%);
      color: var(--text-dark);
    }

    /* ===== HEADER ===== */
    header {
      background: var(--wood-dark);
      background-image: repeating-linear-gradient(
        90deg,
        transparent 0px, transparent 48px,
        rgba(255,255,255,0.025) 48px, rgba(255,255,255,0.025) 49px
      );
      padding: 0.9rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      box-shadow: 0 2px 14px rgba(0,0,0,0.35);
    }
    .header-logo {
      font-family: Georgia, serif;
      font-size: 1.5rem;
      letter-spacing: 0.07em;
      color: var(--cream);
      flex: 1;
    }
    .btn-header {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--cream-dark);
      border-radius: 8px;
      padding: 0.38rem 0.7rem;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .btn-header:hover { background: rgba(255,255,255,0.2); }

    /* ===== WEEK NAV ===== */
    .week-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.25rem 0.5rem;
      gap: 0.5rem;
    }
    .btn-week {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--cream);
      border-radius: 10px;
      width: 38px; height: 38px;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .btn-week:hover { background: rgba(255,255,255,0.22); }
    .week-label {
      font-family: Georgia, serif;
      font-size: 0.95rem;
      color: var(--cream);
      text-align: center;
      flex: 1;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    /* ===== DAYS GRID ===== */
    .days-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.85rem;
      padding: 0.75rem 1.25rem 2rem;
    }

    @media (min-width: 540px) {
      .days-grid { grid-template-columns: repeat(4, 1fr); }
    }

    .day-card {
      background: var(--cream);
      border-radius: 16px;
      padding: 1.1rem 0.75rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.65rem;
      cursor: pointer;
      box-shadow: 0 3px 12px var(--shadow);
      transition: transform 0.15s, box-shadow 0.15s;
      text-align: center;
      border: 2px solid transparent;
    }
    .day-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px var(--shadow); }
    .day-card:active { transform: translateY(0); }
    .day-card.has-assignment { border-color: var(--cream-dark); }

    .day-name {
      font-family: Georgia, serif;
      font-size: 1rem;
      font-weight: bold;
      color: var(--wood-dark);
    }
    .day-date {
      font-size: 0.75rem;
      color: var(--text-light);
      margin-top: -0.45rem;
    }

    .day-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: Georgia, serif; font-size: 1.4rem; font-weight: bold;
      color: white; text-shadow: 0 1px 3px rgba(0,0,0,0.25);
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    .day-avatar.empty {
      background: var(--cream-dark);
      color: var(--text-light);
      font-size: 1.5rem;
      font-weight: normal;
      box-shadow: none;
    }

    .day-person {
      font-size: 0.8rem;
      font-weight: bold;
      color: var(--text-dark);
    }
    .day-person.empty {
      color: var(--text-light);
      font-weight: normal;
      font-style: italic;
    }

    /* ===== PICKER MODAL ===== */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(44, 26, 14, 0.62); z-index: 100;
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--cream); border-radius: 20px 20px 0 0;
      padding: 1.5rem; width: 100%; max-width: 480px;
      box-shadow: 0 -4px 28px rgba(0,0,0,0.22);
    }
    .modal-title {
      font-family: Georgia, serif; font-size: 1.15rem;
      color: var(--wood-dark); margin-bottom: 1.1rem; text-align: center;
    }

    .member-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .member-option {
      background: var(--cream-dark);
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 0.9rem 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .member-option:hover { border-color: var(--wood-mid); background: #FFF8F0; }
    .member-option.selected { border-color: var(--wood-dark); background: #FFF8F0; }

    .member-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: Georgia, serif; font-size: 1.2rem; font-weight: bold;
      color: white; text-shadow: 0 1px 3px rgba(0,0,0,0.25);
    }
    .member-name-label {
      font-size: 0.85rem; font-weight: bold; color: var(--text-dark);
    }

    .btn-clear {
      width: 100%; padding: 0.6rem;
      background: none; border: 1.5px solid var(--cream-dark);
      border-radius: 10px; color: var(--text-light); font-size: 0.85rem;
      cursor: pointer; margin-bottom: 0.75rem; transition: all 0.15s;
    }
    .btn-clear:hover { border-color: #C0664A; color: #C0664A; }

    .btn-cancel {
      width: 100%; padding: 0.7rem;
      background: var(--cream-dark); border: none; border-radius: 10px;
      color: var(--text-mid); font-size: 0.95rem; cursor: pointer;
    }

    @media (min-width: 480px) {
      .modal { border-radius: 20px; margin-bottom: 2rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-logo">Almuerzos</div>
    <a href="index.html" class="btn-header">← Menú</a>
  </header>

  <div class="week-nav">
    <button class="btn-week" onclick="changeWeek(-1)">‹</button>
    <div class="week-label" id="week-label"></div>
    <button class="btn-week" onclick="changeWeek(1)">›</button>
  </div>

  <div class="days-grid" id="days-grid"></div>

  <!-- MEMBER PICKER MODAL -->
  <div class="modal-overlay" id="picker" onclick="onOverlayClick(event)">
    <div class="modal">
      <div class="modal-title" id="picker-title">¿Quién cocina?</div>
      <div class="member-grid" id="member-grid"></div>
      <button class="btn-clear" onclick="clearDay()">Quitar asignación</button>
      <button class="btn-cancel" onclick="closePicker()">Cancelar</button>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://ktpyqsywskwcwanlcukr.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_-prx0KtYuJIjWb0BnxcB1w_vbo26tl4';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const MEMBERS = [
    { name: 'Seba',  color: '#C0664A' },
    { name: 'Fran',  color: '#6A8C69' },
    { name: 'Sayen', color: '#4A6B8C' },
    { name: 'Mati',  color: '#C4A43A' },
  ];

  const DAY_NAMES = ['Lunes', 'Martes', 'Miércoles', 'Jueves'];
  const MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  function toDateStr(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function getInitialMonday() {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const day = today.getDay();
    if (day === 0) {
      const next = new Date(today);
      next.setDate(today.getDate() + 1);
      return next;
    }
    const monday = new Date(today);
    monday.setDate(today.getDate() - (day - 1));
    return monday;
  }

  function addDays(date, n) {
    const d = new Date(date);
    d.setDate(d.getDate() + n);
    return d;
  }

  let weekStart = getInitialMonday();
  let weekAssignments = {};

  function getWeekDays() {
    return [0, 1, 2, 3].map(i => addDays(weekStart, i));
  }

  function formatWeekLabel(days) {
    const first = days[0];
    const last = days[3];
    if (first.getMonth() === last.getMonth()) {
      return `${first.getDate()} al ${last.getDate()} de ${MONTHS[first.getMonth()]} ${first.getFullYear()}`;
    }
    return `${first.getDate()} de ${MONTHS[first.getMonth()]} al ${last.getDate()} de ${MONTHS[last.getMonth()]} ${last.getFullYear()}`;
  }

  async function renderWeek() {
    const days = getWeekDays();
    document.getElementById('week-label').textContent = formatWeekLabel(days);

    const dateStrs = days.map(d => toDateStr(d));
    const { data } = await sb.from('almuerzo_assignments')
      .select('*')
      .in('date', dateStrs);

    weekAssignments = {};
    (data ?? []).forEach(row => { weekAssignments[row.date] = row.member_name; });

    const grid = document.getElementById('days-grid');
    grid.innerHTML = days.map((date, i) => {
      const dateStr = toDateStr(date);
      const assigned = weekAssignments[dateStr];
      const member = assigned ? MEMBERS.find(m => m.name === assigned) : null;

      return `
        <div class="day-card ${member ? 'has-assignment' : ''}" onclick="openPicker('${dateStr}', '${DAY_NAMES[i]}')">
          <div class="day-name">${DAY_NAMES[i]}</div>
          <div class="day-date">${date.getDate()} de ${MONTHS[date.getMonth()]}</div>
          ${member
            ? `<div class="day-avatar" style="background:${member.color}">${member.name[0]}</div>
               <div class="day-person">${member.name}</div>`
            : `<div class="day-avatar empty">?</div>
               <div class="day-person empty">Sin asignar</div>`
          }
        </div>
      `;
    }).join('');
  }

  function changeWeek(dir) {
    weekStart = addDays(weekStart, dir * 7);
    renderWeek();
  }

  // ===== PICKER =====
  let pickerDate = null;

  function openPicker(dateStr, dayName) {
    pickerDate = dateStr;
    const current = weekAssignments[dateStr];

    document.getElementById('picker-title').textContent = `¿Quién cocina el ${dayName.toLowerCase()}?`;

    document.getElementById('member-grid').innerHTML = MEMBERS.map(m => `
      <div class="member-option ${current === m.name ? 'selected' : ''}" onclick="assignMember('${m.name}')">
        <div class="member-avatar" style="background:${m.color}">${m.name[0]}</div>
        <div class="member-name-label">${m.name}</div>
      </div>
    `).join('');

    document.getElementById('picker').classList.add('open');
  }

  function closePicker() {
    document.getElementById('picker').classList.remove('open');
    pickerDate = null;
  }

  function onOverlayClick(e) {
    if (e.target === document.getElementById('picker')) closePicker();
  }

  async function assignMember(name) {
    if (!pickerDate) return;
    await sb.from('almuerzo_assignments')
      .upsert({ date: pickerDate, member_name: name }, { onConflict: 'date' });
    closePicker();
    await renderWeek();
  }

  async function clearDay() {
    if (!pickerDate) return;
    await sb.from('almuerzo_assignments').delete().eq('date', pickerDate);
    closePicker();
    await renderWeek();
  }

  // ===== INIT =====
  renderWeek();
</script>
</body>
</html>
