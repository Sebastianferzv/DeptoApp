<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Depto</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="theme-color" content="#5C3D1E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Depto">
  <style>
    :root {
      --wood-dark: #5C3D1E;
      --wood-mid:  #7A5230;
      --cream:     #FFFDF8;
      --cream-dark:#F0DCC8;
      --text-dark: #2C1A0E;
      --text-mid:  #6B4423;
      --text-light:#9B7355;
      --shadow:    rgba(44, 26, 14, 0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background-color: #6B4423;
      background-image:
        repeating-linear-gradient(
          90deg,
          transparent 0px, transparent 55px,
          rgba(0,0,0,0.04) 55px, rgba(0,0,0,0.04) 56px,
          transparent 56px, transparent 110px,
          rgba(255,255,255,0.025) 110px, rgba(255,255,255,0.025) 111px
        ),
        repeating-linear-gradient(
          0deg,
          transparent 0px, transparent 90px,
          rgba(0,0,0,0.03) 90px, rgba(0,0,0,0.03) 91px
        ),
        linear-gradient(180deg, #8B6040 0%, #6B4423 35%, #7A4F30 65%, #5C3820 100%);
    }

    /* ===== VIEWS ===== */
    .view {
      display: none;
      min-height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      gap: 2.5rem;
    }
    .view.active { display: flex; }

    /* ===== PROFILE SELECTION ===== */
    .app-logo { text-align: center; }
    .app-logo h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 3.2rem;
      color: var(--cream);
      text-shadow: 0 3px 10px rgba(0,0,0,0.45);
      letter-spacing: 0.12em;
    }
    .app-logo p {
      color: var(--cream-dark);
      font-size: 0.95rem;
      opacity: 0.75;
      margin-top: 0.3rem;
      font-family: Georgia, serif;
      font-style: italic;
    }

    .profiles-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      width: 100%;
      max-width: 340px;
    }

    .profile-card {
      background: var(--cream);
      border-radius: 18px;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
      box-shadow: 0 4px 18px var(--shadow);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .profile-card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px var(--shadow); }
    .profile-card:active { transform: translateY(0); }

    .p-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: Georgia, serif; font-size: 1.75rem; font-weight: bold;
      color: white; text-shadow: 0 1px 4px rgba(0,0,0,0.3);
      box-shadow: 0 3px 10px rgba(0,0,0,0.22);
    }
    .p-name {
      font-family: Georgia, serif; font-size: 1.1rem;
      font-weight: bold; color: var(--text-dark);
    }

    /* ===== MENU VIEW ===== */
    #view-menu { position: relative; }

    .user-btn {
      position: absolute;
      top: 1.25rem;
      left: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 0.3rem 0.75rem 0.3rem 0.3rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .user-btn:hover { background: rgba(255,255,255,0.22); }

    .user-btn-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: Georgia, serif; font-size: 1rem; font-weight: bold;
      color: white; flex-shrink: 0;
    }
    .user-btn-name {
      font-size: 0.85rem;
      color: var(--cream-dark);
      font-family: Georgia, serif;
    }

    /* ===== APP CARDS ===== */
    .apps-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      width: 100%;
      max-width: 360px;
    }

    .app-card {
      background: var(--cream);
      border-radius: 18px;
      padding: 1.75rem 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 18px var(--shadow);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .app-card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px var(--shadow); }
    .app-card:active { transform: translateY(0); }

    .app-icon { font-size: 2.4rem; line-height: 1; }
    .app-name {
      font-family: Georgia, serif; font-size: 0.95rem;
      font-weight: bold; color: var(--text-dark);
      text-align: center; line-height: 1.3;
    }
    .app-desc { font-size: 0.72rem; color: var(--text-light); text-align: center; line-height: 1.4; }

    /* ===== CHANGE USER MODAL ===== */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(44, 26, 14, 0.62); z-index: 100;
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--cream); border-radius: 20px 20px 0 0;
      padding: 1.5rem; width: 100%; max-width: 480px;
      box-shadow: 0 -4px 28px rgba(0,0,0,0.22);
    }
    .modal-title {
      font-family: Georgia, serif; font-size: 1.1rem;
      color: var(--wood-dark); margin-bottom: 1.1rem; text-align: center;
    }

    .change-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.6rem;
      margin-bottom: 1rem;
    }
    .change-option {
      background: var(--cream-dark);
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 0.75rem 0.25rem 0.6rem;
      display: flex; flex-direction: column;
      align-items: center; gap: 0.4rem;
      cursor: pointer; transition: all 0.15s;
    }
    .change-option:hover { border-color: var(--wood-mid); background: #FFF4E8; }
    .change-option.current { border-color: var(--wood-dark); background: #FFF4E8; }
    .change-option .cav {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: Georgia, serif; font-size: 1.1rem; font-weight: bold; color: white;
    }
    .change-option .cnm { font-size: 0.75rem; font-weight: bold; color: var(--text-dark); }

    .btn-cancel {
      width: 100%; padding: 0.7rem; background: var(--cream-dark); border: none;
      border-radius: 10px; color: var(--text-mid); font-size: 0.95rem; cursor: pointer;
    }
    .btn-photo {
      width: 100%; padding: 0.65rem; background: #FFF4E8;
      border: 1.5px solid var(--cream-dark); border-radius: 10px;
      color: var(--wood-dark); font-size: 0.9rem; cursor: pointer;
      margin-bottom: 0.5rem;
    }
    .btn-photo:hover { background: #FFE8C8; }

    .notif-card {
      background: rgba(255,248,200,0.15);
      border: 1.5px solid rgba(255,235,130,0.35);
      border-radius: 14px;
      padding: 0.65rem 1rem;
      margin-bottom: 0.5rem;
      color: var(--cream);
      font-size: 0.86rem;
      display: flex;
      align-items: center;
      gap: 0.55rem;
      line-height: 1.4;
    }
    .notif-icon { font-size: 1.1rem; flex-shrink: 0; }

    @media (min-width: 480px) {
      .modal { border-radius: 20px; margin-bottom: 2rem; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- PROFILE SELECTION -->
  <div id="view-profiles" class="view active">
    <div class="app-logo">
      <h1>Depto</h1>
      <p>¿Quién eres?</p>
    </div>
    <div class="profiles-grid" id="profiles-grid"></div>
  </div>

  <!-- MENU -->
  <div id="view-menu" class="view">
    <button class="user-btn" onclick="openChangeModal()">
      <div class="user-btn-avatar" id="user-btn-avatar"></div>
      <span class="user-btn-name" id="user-btn-name"></span>
    </button>

    <div class="app-logo">
      <h1>Depto</h1>
      <p>Coordinación de tareas del departamento</p>
    </div>

    <div id="notifications" style="display:none; width:100%; max-width:360px;"></div>

    <div class="apps-grid">
      <a href="lista.html" class="app-card">
        <div class="app-icon">🛒</div>
        <div class="app-name">Lista de compras</div>
        <div class="app-desc">Lo que falta en el depto</div>
      </a>
      <a href="almuerzo.html" class="app-card">
        <div class="app-icon">🍽️</div>
        <div class="app-name">Almuerzos</div>
        <div class="app-desc">¿Quién cocina esta semana?</div>
      </a>
      <a href="tareas.html" class="app-card">
        <div class="app-icon">📋</div>
        <div class="app-name">Tareas</div>
        <div class="app-desc">Rotación de tareas del hogar</div>
      </a>
    </div>
  </div>

</div>

<input type="file" id="photo-input" accept="image/*" style="display:none" onchange="onPhotoSelected(this)">

<!-- CHANGE USER MODAL -->
<div class="modal-overlay" id="change-modal" onclick="onOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">¿Cambiar de usuario?</div>
    <div class="change-grid" id="change-grid"></div>
    <button class="btn-photo" onclick="editCurrentPhoto()">📷 Cambiar mi foto de perfil</button>
    <button class="btn-cancel" onclick="closeChangeModal()">Cancelar</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://ktpyqsywskwcwanlcukr.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_-prx0KtYuJIjWb0BnxcB1w_vbo26tl4';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const MEMBERS = [
    { name: 'Seba',  color: '#C0664A' },
    { name: 'Fran',  color: '#6A8C69' },
    { name: 'Sayen', color: '#4A6B8C' },
    { name: 'Mati',  color: '#C4A43A' },
  ];

  const USER_KEY = 'deptoUser';

  function getUser() { return localStorage.getItem(USER_KEY); }
  function setUser(name) { localStorage.setItem(USER_KEY, name); }
  function memberColor(name) { return MEMBERS.find(m => m.name === name)?.color ?? '#999'; }

  // ===== PHOTOS =====
  let photoCache = {};

  async function loadPhotos() {
    const { data } = await sb.from('profiles').select('name, photo');
    if (data) data.forEach(r => { if (r.photo) photoCache[r.name] = r.photo; });
  }

  function getPhoto(name) { return photoCache[name] ?? null; }

  function avatarEl(name, cls) {
    const photo = getPhoto(name);
    const color = memberColor(name);
    if (photo) {
      return `<div class="${cls}" style="background:${color};background-image:url('${photo}');background-size:cover;background-position:center"></div>`;
    }
    return `<div class="${cls}" style="background:${color}">${name[0]}</div>`;
  }

  function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ===== PROFILE SELECTION =====
  function renderProfiles() {
    document.getElementById('profiles-grid').innerHTML = MEMBERS.map(m => `
      <div class="profile-card" onclick="selectUser('${m.name}')">
        ${avatarEl(m.name, 'p-avatar')}
        <div class="p-name">${m.name}</div>
      </div>
    `).join('');
  }

  function selectUser(name) {
    setUser(name);
    showMenu(name);
  }

  // ===== MENU =====
  function showMenu(name) {
    const av = document.getElementById('user-btn-avatar');
    const photo = getPhoto(name);
    av.style.background = memberColor(name);
    if (photo) {
      av.style.backgroundImage = `url('${photo}')`;
      av.style.backgroundSize = 'cover';
      av.style.backgroundPosition = 'center';
      av.textContent = '';
    } else {
      av.style.backgroundImage = '';
      av.textContent = name[0];
    }
    document.getElementById('user-btn-name').textContent = name;
    showView('view-menu');
    renderNotifications(name);
  }

  // ===== CHANGE USER MODAL =====
  function openChangeModal() {
    const current = getUser();
    document.getElementById('change-grid').innerHTML = MEMBERS.map(m => `
      <div class="change-option ${m.name === current ? 'current' : ''}" onclick="changeUser('${m.name}')">
        ${avatarEl(m.name, 'cav')}
        <div class="cnm">${m.name}</div>
      </div>
    `).join('');
    document.getElementById('change-modal').classList.add('open');
  }

  function closeChangeModal() {
    document.getElementById('change-modal').classList.remove('open');
  }

  function onOverlayClick(e) {
    if (e.target === document.getElementById('change-modal')) closeChangeModal();
  }

  function changeUser(name) {
    setUser(name);
    showMenu(name);
    closeChangeModal();
  }

  // ===== NOTIFICATIONS =====
  function _toDateStr(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function _getThisMonday() {
    const t = new Date(); t.setHours(0,0,0,0);
    const day = t.getDay();
    if (day === 0) { const n = new Date(t); n.setDate(t.getDate()+1); return n; }
    const m = new Date(t); m.setDate(t.getDate()-(day-1)); return m;
  }
  function _weeksBetween(a, b) { return Math.round((b-a)/(7*24*60*60*1000)); }
  function _getResponsible(task, monday) {
    const start = new Date(task.start_date); start.setHours(0,0,0,0);
    const diff = _weeksBetween(start, monday);
    if (diff < 0 || diff % task.interval_weeks !== 0) return null;
    const slot = Math.floor(diff / task.interval_weeks) % MEMBERS.length;
    return MEMBERS[(task.start_person_index + slot) % MEMBERS.length];
  }

  function _urgencyStyle(u) {
    if (u >= 2) return 'background:rgba(200,40,20,0.32);border-color:rgba(220,60,40,0.72);';
    const t = Math.min(u, 1);
    const g = Math.round(248 - 168 * t);
    const b = Math.round(200 - 140 * t);
    const a  = (0.15 + 0.15 * t).toFixed(2);
    const ba = (0.35 + 0.32 * t).toFixed(2);
    return `background:rgba(255,${g},${b},${a});border-color:rgba(255,${g},${b},${ba});`;
  }

  function _getDayUrgency() {
    const today = new Date(); today.setHours(0, 0, 0, 0);
    if (today < _getThisMonday()) return 0; // semana aún no empezó (ej: domingo)
    const day = today.getDay();
    const d = day === 0 ? 7 : day; // Mon=1, Sun=7
    return (d - 1) / 6;            // Mon=0.0, Sun=1.0
  }

  async function renderNotifications(name) {
    const today = _toDateStr(new Date());
    const monday = _getThisMonday();
    const mondayStr = _toDateStr(monday);
    const urgency = _getDayUrgency();
    const alerts = [];

    const { data: alm } = await sb.from('almuerzo_assignments')
      .select('member_name').eq('date', today).maybeSingle();
    if (alm?.member_name === name) {
      alerts.push({ icon: '🍽️', text: 'Hoy te toca hacer el almuerzo', u: urgency });
    }

    const { data: tareas } = await sb.from('tareas').select('*');
    if (tareas) {
      // Current week — solo si la semana ya comenzó
      const todayDate = new Date(); todayDate.setHours(0, 0, 0, 0);
      if (todayDate >= monday) {
        for (const task of tareas) {
          const person = _getResponsible(task, monday);
          if (person?.name === name) {
            const done = localStorage.getItem('deptoTaskDone_' + task.id + '_' + mondayStr);
            if (!done) alerts.push({ icon: '📋', text: `Tarea pendiente: ${task.name}`, u: urgency });
          }
        }
      }
      // Overdue past weeks
      const seen = new Set();
      for (let w = 1; w <= 12; w++) {
        const prevMon = new Date(monday); prevMon.setDate(monday.getDate() - w * 7);
        const prevStr = _toDateStr(prevMon);
        for (const task of tareas) {
          if (seen.has(task.id)) continue;
          const person = _getResponsible(task, prevMon);
          if (person?.name === name && !localStorage.getItem('deptoTaskDone_' + task.id + '_' + prevStr)) {
            seen.add(task.id);
            alerts.push({ icon: '⚠️', text: `Tarea atrasada: ${task.name}`, u: 2 });
          }
        }
      }
    }

    const el = document.getElementById('notifications');
    el.style.display = alerts.length ? 'block' : 'none';
    el.innerHTML = alerts.map(a =>
      `<div class="notif-card" style="${_urgencyStyle(a.u)}"><span class="notif-icon">${a.icon}</span><span>${a.text}</span></div>`
    ).join('');
  }

  // ===== PHOTO EDITING =====
  let editingPhotoFor = null;

  function editCurrentPhoto() {
    editingPhotoFor = getUser();
    const input = document.getElementById('photo-input');
    input.value = '';
    input.click();
  }

  function onPhotoSelected(input) {
    if (!input.files.length || !editingPhotoFor) return;
    resizeImage(input.files[0], 300, async dataUrl => {
      const name = editingPhotoFor;
      photoCache[name] = dataUrl;
      await sb.from('profiles').upsert(
        { name, photo: dataUrl, updated_at: new Date().toISOString() },
        { onConflict: 'name' }
      );
      renderProfiles();
      const current = getUser();
      if (current === name) showMenu(current);
      if (document.getElementById('change-modal').classList.contains('open')) openChangeModal();
    });
  }

  function resizeImage(file, maxSize, cb) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const ratio = Math.min(maxSize / img.width, maxSize / img.height, 1);
        const canvas = document.createElement('canvas');
        canvas.width  = Math.round(img.width  * ratio);
        canvas.height = Math.round(img.height * ratio);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        cb(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  // ===== INIT =====
  (async () => {
    await loadPhotos();
    renderProfiles();
    const saved = getUser();
    if (saved && MEMBERS.find(m => m.name === saved)) {
      showMenu(saved);
    }
  })();
</script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
  </script>
</body>
</html>
